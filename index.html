<!DOCTYPE html>
<html lang="th">
<link rel="manifest" href="manifest.json">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>สมุดคุมสต็อก</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#132A33;
  --ink-soft:#52707A;
  --paper:#F2F8F9;
  --paper-card:#FFFFFF;
  --kraft:#0E93A6;
  --kraft-dark:#0A6F80;
  --line:#D9E9EC;
  --brand-deep:#00879E;
  --brand-bright:#3FD2DC;
  --stamp-green:#178C74;
  --stamp-green-bg:#E1F3EE;
  --stamp-red:#C1502F;
  --stamp-red-bg:#FBEAE2;
  --shadow-card: 0 1px 0 rgba(19,42,51,0.05);
  --radius:10px;
  --font-display:'Space Grotesk', 'IBM Plex Sans Thai', sans-serif;
  --font-body:'IBM Plex Sans Thai', sans-serif;
  --font-mono:'IBM Plex Mono', 'IBM Plex Sans Thai', monospace;
}
*{box-sizing:border-box;}
body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--font-body);}
.app{max-width:1040px;margin:0 auto;padding:20px 20px 60px;}

.masthead{
  border:1px solid var(--line);
  border-radius:12px;
  padding:20px 24px;
  margin-bottom:18px;
  background:var(--paper-card);
  position:relative;
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:14px;
  overflow:hidden;
}
.masthead::before{
  content:'';
  position:absolute;top:0;left:0;right:0;height:4px;
  background:linear-gradient(90deg, var(--brand-deep), var(--brand-bright));
}
.masthead-brand{display:flex;align-items:center;gap:16px;}
.masthead-brand img{height:76px;width:auto;display:block;}
.masthead h1{
  font-family:var(--font-display);
  font-weight:600;
  font-size:26px;
  letter-spacing:-0.2px;
  margin:0;
  line-height:1.15;
}
.masthead .sub{font-size:12px;color:var(--ink-soft);margin-top:4px;font-family:var(--font-mono);letter-spacing:0.4px;}
.masthead .date-stamp{
  font-family:var(--font-mono);
  font-size:12px;
  border:1px solid var(--line);
  background:var(--paper);
  color:var(--kraft-dark);
  padding:6px 12px;
  border-radius:6px;
}

.tabs{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap;}
.tab-btn{
  font-family:var(--font-body);
  font-weight:600;
  font-size:14px;
  padding:9px 16px;
  background:transparent;
  border:1.5px solid var(--ink);
  border-radius:4px 4px 0 0;
  cursor:pointer;
  color:var(--ink-soft);
}
.tab-btn.active{background:var(--ink);color:var(--paper-card);}

.panel{display:none;}
.panel.active{display:block;}

.card{
  background:var(--paper-card);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:16px 18px;
  box-shadow:var(--shadow-card);
}

.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:18px;}
.metric{
  background:var(--paper-card);
  border:1px solid var(--line);
  border-left:4px solid var(--kraft);
  border-radius:var(--radius);
  padding:14px 16px;
}
.metric.warn{border-left-color:var(--stamp-red);}
.metric.good{border-left-color:var(--stamp-green);}
.metric .label{font-size:11px;text-transform:uppercase;letter-spacing:0.6px;color:var(--ink-soft);font-family:var(--font-mono);}
.metric .value{font-family:var(--font-display);font-size:30px;letter-spacing:0.5px;margin-top:2px;}

.section-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:10px;flex-wrap:wrap;}
.section-head h2{font-family:var(--font-display);font-size:20px;letter-spacing:0.5px;margin:0;font-weight:400;}

button.primary{
  font-family:var(--font-body);font-weight:600;font-size:13.5px;
  background:var(--ink);color:var(--paper-card);border:none;
  padding:9px 16px;border-radius:6px;cursor:pointer;
}
button.primary:hover{background:#1a241f;}
button.ghost{
  font-family:var(--font-body);font-weight:600;font-size:13.5px;
  background:transparent;color:var(--ink);border:1.5px solid var(--ink);
  padding:8px 14px;border-radius:6px;cursor:pointer;
}
button.ghost:hover{background:var(--line);}
button.small{padding:5px 10px;font-size:12px;border-radius:5px;}
button.danger-outline{border-color:var(--stamp-red);color:var(--stamp-red);}

table{width:100%;border-collapse:collapse;font-size:13.5px;}
th{text-align:left;font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--ink-soft);padding:8px 8px;border-bottom:1.5px solid var(--ink);}
td{padding:9px 8px;border-bottom:1px solid var(--line);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
.mono{font-family:var(--font-mono);}
.item-name{font-weight:600;}
.qty-low{color:var(--stamp-red);font-weight:700;}

.badge{
  display:inline-block;font-family:var(--font-mono);font-size:11px;font-weight:600;
  padding:3px 8px;border-radius:4px;letter-spacing:0.3px;
}
.badge.in{background:var(--stamp-green-bg);color:var(--stamp-green);}
.badge.out{background:var(--stamp-red-bg);color:var(--stamp-red);}
.badge.low{background:var(--stamp-red-bg);color:var(--stamp-red);}
.badge.ok{background:var(--stamp-green-bg);color:var(--stamp-green);}
.badge.grp{background:#EDE6D3;color:var(--kraft-dark);}
.badge.warr-active{background:var(--stamp-green-bg);color:var(--stamp-green);}
.badge.warr-soon{background:#F5E9D6;color:var(--kraft-dark);}
.badge.warr-expired{background:var(--stamp-red-bg);color:var(--stamp-red);}
.serial-tag{display:inline-block;font-family:var(--font-mono);font-size:12px;background:#EFEADC;color:var(--ink);padding:2px 7px;border-radius:4px;margin:0 4px 4px 0;}

.img-picker{display:flex;align-items:center;gap:12px;}
.img-preview{
  width:64px;height:64px;border-radius:8px;border:1.5px dashed var(--line);
  background:#fff;display:flex;align-items:center;justify-content:center;
  overflow:hidden;flex-shrink:0;font-size:10px;color:var(--ink-soft);text-align:center;
}
.img-preview img{width:100%;height:100%;object-fit:cover;display:block;}
.img-picker-actions{display:flex;gap:8px;flex-wrap:wrap;}
.thumb{
  width:56px;height:56px;border-radius:8px;object-fit:cover;
  border:1px solid var(--line);display:block;background:#fff;flex-shrink:0;
}
.thumb-empty{
  width:56px;height:56px;border-radius:8px;border:1px dashed var(--line);
  background:#fff;flex-shrink:0;
}
.item-cell{display:flex;align-items:center;gap:12px;}

.group-head{
  font-family:var(--font-display);font-size:17px;letter-spacing:0.5px;
  display:flex;align-items:center;gap:8px;margin:0 0 8px;color:var(--ink);
}
.group-head .count{font-family:var(--font-mono);font-size:11px;color:var(--ink-soft);font-weight:400;}
.group-block{margin-bottom:18px;}
.group-block:last-child{margin-bottom:0;}

.empty{padding:30px 10px;text-align:center;color:var(--ink-soft);font-size:14px;}
.empty .big{font-family:var(--font-display);font-size:22px;color:var(--ink);margin-bottom:4px;}

.modal-wrap{position:fixed;inset:0;background:rgba(38,51,44,0.45);display:none;align-items:center;justify-content:center;z-index:50;padding:16px;}
.modal-wrap.open{display:flex;}
.modal{
  background:var(--paper-card);border:2px solid var(--ink);border-radius:8px;
  width:100%;max-width:420px;padding:20px;max-height:88vh;overflow-y:auto;
}
.modal h3{font-family:var(--font-display);font-size:22px;font-weight:400;margin:0 0 14px;letter-spacing:0.5px;}
.field{margin-bottom:12px;}
.field label{display:block;font-size:12px;font-weight:600;color:var(--ink-soft);margin-bottom:5px;}
.field input,.field select,.field textarea{
  width:100%;padding:9px 10px;border:1.5px solid var(--line);border-radius:6px;
  font-family:var(--font-body);font-size:14px;background:#fff;color:var(--ink);
}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--kraft);}
.field-row{display:flex;gap:10px;}
.field-row .field{flex:1;}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;}
.type-toggle{display:flex;gap:8px;margin-bottom:12px;}
.type-toggle button{flex:1;padding:10px;border-radius:6px;border:1.5px solid var(--line);background:#fff;font-weight:700;font-family:var(--font-body);cursor:pointer;color:var(--ink-soft);}
.type-toggle button.sel-in.selected{border-color:var(--stamp-green);background:var(--stamp-green-bg);color:var(--stamp-green);}
.type-toggle button.sel-out.selected{border-color:var(--stamp-red);background:var(--stamp-red-bg);color:var(--stamp-red);}

.report-box{
  border:1.5px dashed var(--kraft-dark);border-radius:8px;padding:16px;
  font-family:var(--font-mono);font-size:13px;white-space:pre-wrap;line-height:1.7;
  background:#fff;
}
.note{font-size:12.5px;color:var(--ink-soft);line-height:1.6;margin-top:10px;}
.note b{color:var(--ink);}
.toast{
  position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
  background:var(--ink);color:var(--paper-card);padding:10px 18px;border-radius:6px;
  font-size:13.5px;opacity:0;transition:opacity .25s;pointer-events:none;z-index:60;
}
.toast.show{opacity:1;}
.filters{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.filters select,.filters input{padding:7px 9px;border:1.5px solid var(--line);border-radius:6px;font-family:var(--font-body);font-size:13px;background:#fff;}
.loading{padding:40px;text-align:center;color:var(--ink-soft);font-family:var(--font-mono);}
@media(max-width:600px){
  .masthead h1{font-size:26px;}
}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="loading" id="loading">กำลังโหลดข้อมูล…</div>
</div>

<div class="modal-wrap" id="itemModalWrap">
  <div class="modal">
    <h3 id="itemModalTitle">เพิ่มสินค้าใหม่</h3>
    <input type="hidden" id="itemEditId">
    <div class="field">
      <label>รูปสินค้า (ไม่บังคับ)</label>
      <div class="img-picker">
        <div class="img-preview" id="fImagePreview">ไม่มีรูป</div>
        <div class="img-picker-actions">
          <button type="button" class="ghost small" onclick="document.getElementById('fImageFile').click()">เลือกรูป</button>
          <button type="button" class="ghost small danger-outline" id="fImageRemoveBtn" onclick="removePendingImage()" style="display:none;">ลบรูป</button>
          <input type="file" id="fImageFile" accept="image/*" style="display:none;" onchange="handleImageSelect(event)">
        </div>
      </div>
    </div>
    <div class="field"><label>ชื่อสินค้า</label><input id="fName" placeholder="เช่น กระดาษ A4 80 แกรม"></div>
    <div class="field-row">
      <div class="field"><label>รหัสสินค้า (SKU)</label><input id="fSku" placeholder="เช่น PPR-A4-80" class="mono"></div>
      <div class="field"><label>หน่วยนับ</label><input id="fUnit" placeholder="เช่น รีม, ชิ้น, กล่อง"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>จำนวนคงเหลือเริ่มต้น</label><input id="fQty" type="number" min="0" value="0"></div>
      <div class="field"><label>จุดสั่งซื้อขั้นต่ำ</label><input id="fMin" type="number" min="0" value="5"></div>
    </div>
    <div class="field"><label>ต้นทุนต่อหน่วย (บาท)</label><input id="fCost" type="number" min="0" step="0.01" value="0"></div>
    <div class="field"><label>กลุ่มสินค้า</label>
      <select id="fCategory">
        <option value="Hoymiles">Hoymiles</option>
        <option value="Huawei">Huawei</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="ghost" onclick="closeItemModal()">ยกเลิก</button>
      <button class="primary" onclick="saveItem()">บันทึกสินค้า</button>
    </div>
  </div>
</div>

<div class="modal-wrap" id="txModalWrap">
  <div class="modal">
    <h3 id="txModalTitle">บันทึกรับเข้า / จ่ายออก</h3>
    <div class="type-toggle">
      <button class="sel-in" id="btnTypeIn" onclick="setTxType('in')">รับเข้า (IN)</button>
      <button class="sel-out" id="btnTypeOut" onclick="setTxType('out')">จ่ายออก (OUT)</button>
    </div>
    <div class="field">
      <label>สินค้า</label>
      <select id="txItem"></select>
    </div>
    <div class="field-row">
      <div class="field"><label>จำนวน</label><input id="txQty" type="number" min="1" value="1"></div>
      <div class="field"><label>วันที่</label><input id="txDate" type="date"></div>
    </div>
    <div class="note" id="txEditNote" style="display:none;margin-top:-4px;margin-bottom:12px;">แก้ไขได้เฉพาะวันที่ หมายเหตุ และข้อมูลลูกค้า/Serial เท่านั้น — เปลี่ยนสินค้า จำนวน หรือประเภทรายการไม่ได้ (ถ้ากรอกผิดสินค้า/จำนวน ให้ลบรายการเดิมแล้วบันทึกใหม่แทน)</div>
    <div class="field"><label>หมายเหตุ (ไม่บังคับ)</label><input id="txNote" placeholder="เช่น รับจากซัพพลายเออร์ A / เบิกใช้แผนกบัญชี"></div>
    <div id="txOutSection" style="display:none;">
      <div class="field-row">
        <div class="field"><label>ชื่อลูกค้า (ไม่บังคับ)</label><input id="txCustomer" placeholder="เช่น บริษัท เอบีซี จำกัด / คุณสมชาย"></div>
        <div class="field"><label>จังหวัด (ไม่บังคับ)</label><select id="txProvince"><option value="">- ไม่ระบุ -</option></select></div>
      </div>
      <div class="field">
        <label>ระยะเวลารับประกัน (นับจากวันที่ขาย)</label>
        <select id="txWarrantyYears"></select>
      </div>
      <div class="field">
        <label>เลข Serial Number (กรอกทีละบรรทัด ให้ครบตามจำนวนที่ขาย)</label>
        <textarea id="txSerials" rows="3" class="mono" placeholder="เช่น&#10;HM-2024-0001&#10;HM-2024-0002"></textarea>
      </div>
    </div>
    <div class="modal-actions">
      <button class="ghost" onclick="closeTxModal()">ยกเลิก</button>
      <button class="primary" id="txSaveBtn" onclick="saveTx()">บันทึกรายการ</button>
    </div>
  </div>
</div>

<div class="modal-wrap" id="serialModalWrap">
  <div class="modal">
    <h3>แก้ไขข้อมูลประกัน / Serial</h3>
    <input type="hidden" id="serialEditId">
    <div class="field"><label>สินค้า</label><select id="serialItem"></select></div>
    <div class="field"><label>Serial Number</label><input id="serialNumber" class="mono"></div>
    <div class="field-row">
      <div class="field"><label>วันที่ขาย</label><input id="serialSaleDate" type="date"></div>
      <div class="field"><label>ระยะเวลารับประกัน</label><select id="serialWarrantyYears"></select></div>
    </div>
    <div class="field-row">
      <div class="field"><label>ชื่อลูกค้า (ไม่บังคับ)</label><input id="serialCustomer" placeholder="เช่น บริษัท เอบีซี จำกัด / คุณสมชาย"></div>
      <div class="field"><label>จังหวัด (ไม่บังคับ)</label><select id="serialProvince"><option value="">- ไม่ระบุ -</option></select></div>
    </div>
    <div class="field"><label>หมายเหตุ (ไม่บังคับ)</label><input id="serialNote"></div>
    <div class="modal-actions">
      <button class="ghost" onclick="closeSerialModal()">ยกเลิก</button>
      <button class="primary" onclick="saveSerialEdit()">บันทึกการแก้ไข</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let DATA = { items: [], transactions: [], serials: [] };
let currentTab = 'dashboard';
let currentTxType = 'in';
let editingTxId = null;
let unlocked = false;
const EDIT_PIN = '1234'; // เปลี่ยนรหัสตรงนี้ก่อนแชร์ลิงก์ให้คนอื่น

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function todayStr(){ return new Date().toISOString().slice(0,10); }
function fmtDate(d){
  const dt = new Date(d+'T00:00:00');
  return dt.toLocaleDateString('th-TH', {day:'2-digit', month:'short', year:'2-digit'});
}
function addYears(dateStr, years){
  const dt = new Date(dateStr+'T00:00:00');
  dt.setFullYear(dt.getFullYear()+years);
  return dt.toISOString().slice(0,10);
}
function warrantyStatus(expiry){
  const today = todayStr();
  const days = Math.round((new Date(expiry+'T00:00:00') - new Date(today+'T00:00:00')) / 86400000);
  if(days < 0) return {label:'หมดประกันแล้ว', cls:'warr-expired'};
  if(days <= 60) return {label:'ใกล้หมดประกัน', cls:'warr-soon'};
  return {label:'ในประกัน', cls:'warr-active'};
}
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

function toggleUnlock(){
  if(unlocked){
    unlocked = false;
    render();
    showToast('กลับเป็นโหมดดูอย่างเดียวแล้ว');
    return;
  }
  const pin = prompt('กรอกรหัสเพื่อเปิดโหมดแก้ไข');
  if(pin===null) return;
  if(pin===EDIT_PIN){
    unlocked = true;
    render();
    showToast('เปิดโหมดแก้ไขแล้ว');
  }else{
    showToast('รหัสไม่ถูกต้อง');
  }
}

async function loadData(){
  try{
    const res = await window.storage.get('inventory-app-data', true);
    if(res && res.value){ DATA = JSON.parse(res.value); }
  }catch(e){
    DATA = { items: [], transactions: [], serials: [] };
  }
  if(!DATA.serials) DATA.serials = [];
  render();
}
async function persist(){
  try{
    await window.storage.set('inventory-app-data', JSON.stringify(DATA), true);
  }catch(e){
    showToast('บันทึกข้อมูลไม่สำเร็จ ลองใหม่อีกครั้ง');
  }
}

function render(){
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="masthead">
      <div class="masthead-brand">
        <img src="${LOGO_DATA_URI}" alt="Trinity Global Innovation Co., Ltd.">
        <div>
          <h1>สมุดคุมสต็อก</h1>
          <div class="sub">TRINITY GLOBAL INNOVATION · ระบบบันทึกรับเข้า–จ่ายออกสินค้า</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <div class="date-stamp">วันนี้ ${fmtDate(todayStr())}</div>
        <button class="ghost small" style="${unlocked?'border-color:var(--stamp-green);color:var(--stamp-green);':''}" onclick="toggleUnlock()">${unlocked?'🔓 โหมดแก้ไข (แตะเพื่อล็อก)':'🔒 ดูอย่างเดียว (แตะเพื่อแก้ไข)'}</button>
      </div>
    </div>
    <div class="tabs">
      <button class="tab-btn ${currentTab==='dashboard'?'active':''}" onclick="switchTab('dashboard')">แดชบอร์ด</button>
      <button class="tab-btn ${currentTab==='items'?'active':''}" onclick="switchTab('items')">สินค้า</button>
      <button class="tab-btn ${currentTab==='history'?'active':''}" onclick="switchTab('history')">ประวัติเข้า-ออก</button>
      <button class="tab-btn ${currentTab==='warranty'?'active':''}" onclick="switchTab('warranty')">ประกันสินค้า</button>
      <button class="tab-btn ${currentTab==='notify'?'active':''}" onclick="switchTab('notify')">แจ้งเตือน LINE</button>
    </div>
    <div id="panelHost"></div>
  `;
  renderPanel();
}

function switchTab(t){ currentTab = t; render(); }

function renderPanel(){
  const host = document.getElementById('panelHost');
  if(currentTab==='dashboard') host.innerHTML = dashboardHTML();
  else if(currentTab==='items') host.innerHTML = itemsHTML();
  else if(currentTab==='history') host.innerHTML = historyHTML();
  else if(currentTab==='warranty') host.innerHTML = warrantyHTML();
  else host.innerHTML = notifyHTML();
  if(currentTab==='history') attachHistoryFilters();
  if(currentTab==='warranty') attachWarrantyFilters();
}

function lowStockItems(){
  return DATA.items.filter(i => i.qty <= i.minStock);
}
function txInRange(days){
  const cutoff = new Date(); cutoff.setDate(cutoff.getDate()-days); cutoff.setHours(0,0,0,0);
  return DATA.transactions.filter(t => new Date(t.date+'T00:00:00') >= cutoff);
}

function fmtBaht(n){
  return '฿' + Number(n||0).toLocaleString('th-TH', {minimumFractionDigits:0, maximumFractionDigits:0});
}
function stockValue(items){
  return items.reduce((s,i)=> s + (i.qty * (i.cost||0)), 0);
}
function exportBackup(){
  const blob = new Blob([JSON.stringify(DATA, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'inventory-backup-' + todayStr() + '.json';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('ดาวน์โหลดไฟล์สำรองแล้ว');
}
async function handleImportBackup(evt){
  const fileInput = evt.target;
  if(!unlocked){ showToast('เปิดโหมดแก้ไขก่อนเพื่อกู้คืนข้อมูล'); fileInput.value=''; return; }
  const file = fileInput.files && fileInput.files[0];
  if(!file) return;
  try{
    const text = await file.text();
    const parsed = JSON.parse(text);
    if(!parsed || !Array.isArray(parsed.items)){
      alert('ไฟล์นี้ไม่ใช่ไฟล์สำรองข้อมูลที่ถูกต้อง (ต้องเป็นไฟล์ .json ที่ดาวน์โหลดจากปุ่ม "ดาวน์โหลดไฟล์สำรอง")');
      fileInput.value=''; return;
    }
    const itemCount = parsed.items.length;
    const txCount = Array.isArray(parsed.transactions) ? parsed.transactions.length : 0;
    const serialCount = Array.isArray(parsed.serials) ? parsed.serials.length : 0;
    if(!confirm('การกู้คืนจะเขียนทับข้อมูลปัจจุบันทั้งหมดในแอปนี้ด้วยข้อมูลจากไฟล์ (สินค้า ' + itemCount + ' รายการ, ประวัติ ' + txCount + ' รายการ, Serial ' + serialCount + ' รายการ) ต้องการดำเนินการต่อหรือไม่?')){
      fileInput.value=''; return;
    }
    DATA = {
      items: Array.isArray(parsed.items) ? parsed.items : [],
      transactions: Array.isArray(parsed.transactions) ? parsed.transactions : [],
      serials: Array.isArray(parsed.serials) ? parsed.serials : []
    };
    await persist();
    render();
    showToast('กู้คืนข้อมูลสำเร็จ');
  }catch(e){
    alert('ไม่สามารถอ่านไฟล์นี้ได้ กรุณาตรวจสอบว่าเป็นไฟล์ JSON ที่ถูกต้อง');
  }
  fileInput.value='';
}

function attachHistoryFilters(){
  const ft = document.getElementById('filterType');
  const fg = document.getElementById('filterGroup');
  const fi = document.getElementById('filterItem');
  const draw = ()=>{
    const type = ft.value, group = fg.value, itemId = fi.value;
    let rows = [...DATA.transactions].sort((a,b)=> (b.date+b.id).localeCompare(a.date+a.id));
    if(type!=='all') rows = rows.filter(t=>t.type===type);
    if(itemId!=='all') rows = rows.filter(t=>t.itemId===itemId);
    if(group!=='all') rows = rows.filter(t=>{
      const item = DATA.items.find(i=>i.id===t.itemId);
      return item && (item.category||'Hoymiles')===group;
    });
    const host = document.getElementById('historyTableHost');
    if(rows.length===0){ host.innerHTML = `<div class="empty"><div class="big">ไม่พบรายการ</div>ลองเปลี่ยนตัวกรองด้านบน</div>`; return; }
    let html = `<table><thead><tr><th>วันที่</th><th>สินค้า</th><th>แบรนด์</th><th>ประเภท</th><th>จำนวน</th><th>หมายเหตุ</th><th></th></tr></thead><tbody>`;
    rows.forEach(t=>{
      const item = DATA.items.find(i=>i.id===t.itemId);
      html += `<tr><td class="mono">${fmtDate(t.date)}</td><td>${esc(item?item.name:'(ลบแล้ว)')}</td><td><span class="badge grp">${esc(item?(item.category||'Hoymiles'):'-')}</span></td><td><span class="badge ${t.type}">${t.type==='in'?'รับเข้า':'จ่ายออก'}</span></td><td class="mono">${t.qty}</td><td>${esc(t.note||'-')}</td><td style="text-align:right;white-space:nowrap;">${unlocked?`<button class="ghost small" onclick="openTxModal('${t.id}')">แก้ไข</button>`:''}</td></tr>`;
    });
    html += `</tbody></table>`;
    host.innerHTML = html;
  };
  ft.addEventListener('change', draw);
  fg.addEventListener('change', draw);
  fi.addEventListener('change', draw);
  draw();
}

function attachWarrantyFilters(){
  const sInput = document.getElementById('warrSearch');
  const gSel = document.getElementById('warrGroup');
  const stSel = document.getElementById('warrStatus');
  const draw = ()=>{
    const q = sInput.value.trim().toLowerCase();
    const group = gSel.value;
    const status = stSel.value;
    let rows = [...DATA.serials].sort((a,b)=> (b.saleDate+b.id).localeCompare(a.saleDate+a.id));
    rows = rows.map(s=>({...s, item: DATA.items.find(i=>i.id===s.itemId)}));
    if(group!=='all') rows = rows.filter(r=> r.item && (r.item.category||'Hoymiles')===group);
    if(status!=='all') rows = rows.filter(r=> warrantyStatus(r.warrantyExpiry).cls===status);
    if(q) rows = rows.filter(r=> r.serial.toLowerCase().includes(q) || (r.item && r.item.name.toLowerCase().includes(q)) || (r.customer && r.customer.toLowerCase().includes(q)));
    const host = document.getElementById('warrantyTableHost');
    if(rows.length===0){ host.innerHTML = `<div class="empty"><div class="big">ไม่พบข้อมูล</div>ลองค้นหาหรือเปลี่ยนตัวกรองด้านบน</div>`; return; }
    let html = `<table><thead><tr><th>Serial No.</th><th>สินค้า</th><th>ลูกค้า</th><th>จังหวัด</th><th>แบรนด์</th><th>วันที่ขาย</th><th>ระยะประกัน</th><th>หมดประกัน</th><th>สถานะ</th><th></th></tr></thead><tbody>`;
    rows.forEach(r=>{
      const st = warrantyStatus(r.warrantyExpiry);
      html += `<tr>
        <td class="mono">${esc(r.serial)}</td>
        <td>${esc(r.item?r.item.name:'(ลบแล้ว)')}</td>
        <td>${esc(r.customer||'-')}</td>
        <td>${esc(r.province||'-')}</td>
        <td><span class="badge grp">${esc(r.item?(r.item.category||'Hoymiles'):'-')}</span></td>
        <td class="mono">${fmtDate(r.saleDate)}</td>
        <td class="mono">${r.warrantyYears} ปี</td>
        <td class="mono">${fmtDate(r.warrantyExpiry)}</td>
        <td><span class="badge ${st.cls}">${st.label}</span></td>
        <td style="text-align:right;white-space:nowrap;">${unlocked?`<button class="ghost small" onclick="openSerialModal('${r.id}')">แก้ไข</button>
        <button class="ghost small danger-outline" onclick="deleteSerial('${r.id}')">ลบ</button>`:''}</td>
      </tr>`;
    });
    html += `</tbody></table>`;
    host.innerHTML = html;
  };
  sInput.addEventListener('input', draw);
  gSel.addEventListener('change', draw);
  stSel.addEventListener('change', draw);
  draw();
}

function openSerialModal(id){
  if(!unlocked){ showToast('เปิดโหมดแก้ไขก่อนเพื่อแก้ไขข้อมูลประกัน'); return; }
  const rec = DATA.serials.find(s=>s.id===id);
  if(!rec) return;
  document.getElementById('serialEditId').value = id;
  const itemSel = document.getElementById('serialItem');

function parseCSVLine(line){
  const result = [];
  let cur = '', inQuotes = false;
  for(let i=0;i<line.length;i++){
    const c = line[i];
    if(inQuotes){
      if(c === '"'){
        if(line[i+1] === '"'){ cur += '"'; i++; } else { inQuotes = false; }
      }else{ cur += c; }
    }else{
      if(c === '"'){ inQuotes = true; }
      else if(c === ','){ result.push(cur); cur = ''; }
      else{ cur += c; }
    }
  }
  result.push(cur);
  return result;
}
function parseCSV(text){
  const lines = text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n').filter(l=>l.trim()!=='');
  if(lines.length<2) return {headers:[], rows:[]};
  const headers = parseCSVLine(lines[0]).map(h=>h.trim().toLowerCase().replace(/^\uFEFF/,''));
  const rows = lines.slice(1).map(l=>{
    const cells = parseCSVLine(l);
    const obj = {};
    headers.forEach((h,idx)=>{ obj[h] = (cells[idx]||'').trim(); });
    return obj;
  });
  return {headers, rows};
}
function downloadCsvTemplate(){
  const csv = '\uFEFFserial,item_name,brand,sale_date,warranty_years,customer_name,province,note\nHM-2024-0001,Hoymiles HM-1500,Hoymiles,2024-01-15,5,บริษัท เอบีซี จำกัด,เชียงใหม่,ตัวอย่างแถวข้อมูล ลบทิ้งก่อนนำเข้าจริง\n';
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'serial-import-template.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
async function handleImportSerials(evt){
  const fileInput = evt.target;
  if(!unlocked){ showToast('เปิดโหมดแก้ไขก่อนเพื่อนำเข้าข้อมูล'); fileInput.value=''; return; }
  const file = fileInput.files && fileInput.files[0];
  if(!file) return;
  try{
    const text = await file.text();
    const {headers, rows} = parseCSV(text);
    if(!headers.includes('serial') || !headers.includes('item_name') || !headers.includes('sale_date')){
      alert('ไฟล์ CSV ต้องมีคอลัมน์อย่างน้อย serial, item_name, sale_date (ดูตัวอย่างจากปุ่ม "ดาวน์โหลดเทมเพลต CSV")');
      fileInput.value=''; return;
    }
    let added=0, skippedDup=0, skippedInvalid=0, createdItems=0;
    const existingSerials = new Set(DATA.serials.map(s=>s.serial.toLowerCase()));
    rows.forEach(row=>{
      const serial = (row.serial||'').trim();
      const itemName = (row.item_name||'').trim();
      const saleDate = (row.sale_date||'').trim();
      let brand = (row.brand||'').trim();
      let years = Number(row.warranty_years) || 1;
      years = Math.min(15, Math.max(1, years));
      const note = (row.note||'').trim();
      const customer = (row.customer_name||'').trim();
      const province = (row.province||'').trim();
      if(!serial || !itemName || !/^\d{4}-\d{2}-\d{2}$/.test(saleDate)){ skippedInvalid++; return; }
      if(existingSerials.has(serial.toLowerCase())){ skippedDup++; return; }
      if(!GROUPS.includes(brand)) brand = 'Hoymiles';
      let item = DATA.items.find(i=> i.name.trim().toLowerCase()===itemName.toLowerCase());
      if(!item){
        item = {id:uid(), name:itemName, sku:'', unit:'ชิ้น', qty:0, minStock:5, category:brand};
        DATA.items.push(item);
        createdItems++;
      }
      const expiry = addYears(saleDate, years);
      DATA.serials.push({id:uid(), serial, itemId:item.id, txId:null, saleDate, warrantyYears:years, warrantyExpiry:expiry, note, customer, province});
      existingSerials.add(serial.toLowerCase());
      added++;
    });
    await persist();
    render();
    let msg = `นำเข้าสำเร็จ ${added} รายการ`;
    if(createdItems) msg += `\nสร้างสินค้าใหม่ ${createdItems} รายการ (จำนวนคงเหลือเริ่มต้นที่ 0 อย่าลืมไปแก้จำนวนจริง)`;
    if(skippedDup) msg += `\nข้าม (Serial ซ้ำ) ${skippedDup} รายการ`;
    if(skippedInvalid) msg += `\nข้าม (ข้อมูลไม่ครบ/วันที่ผิดรูปแบบ) ${skippedInvalid} รายการ`;
    alert(msg);
  }catch(e){
    alert('ไม่สามารถอ่านไฟล์นี้ได้ กรุณาตรวจสอบว่าเป็นไฟล์ CSV ที่ถูกต้อง');
  }
  fileInput.value='';
}

function readAndCompressImage(file){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = e=>{
      const img = new Image();
      img.onload = ()=>{
        const maxDim = 480;
        let w = img.width, h = img.height;
        if(w>h){ if(w>maxDim){ h = Math.round(h*maxDim/w); w = maxDim; } }
        else{ if(h>maxDim){ w = Math.round(w*maxDim/h); h = maxDim; } }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', 0.65));
      };
      img.onerror = ()=> reject(new Error('อ่านรูปไม่สำเร็จ'));
      img.src = e.target.result;
    };
    reader.onerror = ()=> reject(new Error('อ่านไฟล์ไม่สำเร็จ'));
    reader.readAsDataURL(file);
  });
}

      DATA.serials = DATA.serials.filter(s=>s.txId!==tx.id);
      const expiry = addYears(date, warrantyYears);
      serials.forEach(sn=>{
        DATA.serials.push({id:uid(), serial:sn, itemId:tx.itemId, txId:tx.id, saleDate:date, warrantyYears, warrantyExpiry:expiry, note, customer, province});
      });
    }
    await persist();
    closeTxModal();
    render();
    showToast('แก้ไขรายการแล้ว');
    return;
  }

  if(currentTxType==='out' && qty > item.qty){
    if(!confirm('จำนวนที่จ่ายออกมากกว่าที่มีในสต็อก (' + item.qty + ' ' + item.unit + ') ต้องการดำเนินการต่อหรือไม่?')) return;
  }
  let serials = [];
  let warrantyYears = null;
  let customer = '', province = '';
  if(currentTxType==='out'){
    customer = document.getElementById('txCustomer').value.trim();
    province = document.getElementById('txProvince').value;
    warrantyYears = Number(document.getElementById('txWarrantyYears').value) || 1;
    const raw = document.getElementById('txSerials').value;
    serials = raw.split(/[\n,]/).map(s=>s.trim()).filter(Boolean);
    if(serials.length>0 && serials.length!==qty){
      showToast('จำนวน Serial Number (' + serials.length + ') ไม่ตรงกับจำนวนที่ขาย (' + qty + ')');
      return;
    }
    if(serials.length===0){
      if(!confirm('ยังไม่ได้กรอก Serial Number จะไม่สามารถติดตามการรับประกันของสินค้าล็อตนี้ได้ ต้องการบันทึกต่อโดยไม่ระบุ Serial หรือไม่?')) return;
    }
  }
  const txId = uid();
  item.qty += currentTxType==='in' ? qty : -qty;
  DATA.transactions.push({id:txId, itemId, type:currentTxType, qty, date, note});
  if(currentTxType==='out' && serials.length>0){
    const expiry = addYears(date, warrantyYears);
    serials.forEach(sn=>{
      DATA.serials.push({id:uid(), serial:sn, itemId, txId, saleDate:date, warrantyYears, warrantyExpiry:expiry, note, customer, province});
    });
  }
  await persist();
  closeTxModal();
  render();
  showToast(currentTxType==='in' ? 'บันทึกรับเข้าแล้ว' : 'บันทึกจ่ายออกแล้ว');
}

loadData();
</script>
</body>
</html>
